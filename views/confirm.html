<div class="view" id="view-confirm">
<div class="confirm-view">
  <div class="confirm-bg"></div>
  <div class="confirm-card">
    <div class="confirm-icon">Gracias</div>
    <h2>¡Gracias por reconocerla!</h2>
    <p class="c-sub">Tu reseña fue guardada para este perfil. Si el pago corresponde, aparecerá publicada automáticamente.</p>
    <span class="badge badge-green" style="margin-bottom:24px;padding:8px 20px;font-size:13px">Reseña publicada exitosamente</span>
    <div class="confirm-summary">
      <div class="cs-row"><span class="cs-label">Reseña para</span><span class="cs-value" id="csProfileName">Este perfil</span></div>
      <div class="cs-row"><span class="cs-label">Publicada como</span><span class="cs-value" id="csAuthor">Visitante</span></div>
      <div class="cs-row"><span class="cs-label">Medio de pago</span><span class="cs-value" id="csPago">Pago MercadoPago</span></div>
      <div class="cs-row"><span class="cs-label">Recompensa enviada</span><span class="cs-value gold" id="csAmount">$1.000</span></div>
    </div>
    <div id="confirmRewardBox" style="display:none"></div>
    <div class="confirm-btns">
      <button class="btn btn-green btn-full" style="border-radius:var(--radius)" onclick="doShare()">Compartir perfil</button>
      <button class="btn btn-ghost btn-full" style="border-radius:var(--radius)" onclick="nav('profile')">Ver el perfil publicado</button>
      <button class="btn btn-surface btn-full" style="border-radius:var(--radius)" onclick="nav('home')">Volver al inicio</button>
    </div>
  </div>
</div>
</div>
